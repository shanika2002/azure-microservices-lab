<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Azure Microservices Lab Frontend</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      text-align: center;
      background: #f4f6f8;
    }
    .card {
      max-width: 700px;
      margin: auto;
      padding: 30px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.1);
    }
    h1 { color: #0078d4; }
    button {
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      background: #0078d4;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }
    button:hover { background: #005ea2; }
    #result {
      margin-top: 20px;
      font-size: 18px;
      color: green;
      word-break: break-word;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Azure Microservices Lab</h1>
    <p>This frontend is hosted using Azure Static Web Apps.</p>
    <p>Click the button below to test the deployed gateway service.</p>

    <button onclick="checkHealth()">Check Gateway Health</button>
    <button onclick="getItems()">Get Items</button>
    <div id="result"></div>
  </div>

  <script>
    const API_URL = "https://gateway.gentlehill-571d6cde.southeastasia.azurecontainerapps.io";

    async function checkHealth() {
      const result = document.getElementById("result");
      result.innerText = "Checking...";

      try {
        const res = await fetch(`${API_URL}/health`, {
          method: "GET",
          headers: { "Accept": "application/json" }
        });

        result.innerText = `HTTP ${res.status} ${res.statusText}`;

        const text = await res.text();
        result.innerText += `\nResponse: ${text}`;
      } catch (err) {
        console.error("Fetch error:", err);
        result.innerText = `Failed to connect to gateway.\nError: ${err.message}`;
      }
    }

    async function getItems() {
      const result = document.getElementById("result");
      result.innerText = "Fetching items...";

      try {
        const res = await fetch(`${API_URL}/api/items`, {
          method: "GET",
          headers: { "Accept": "application/json" }
        });

        result.innerText = `HTTP ${res.status} ${res.statusText}`;

        const items = await res.json();
        result.innerText += `\nItems: ${JSON.stringify(items, null, 2)}`;
      } catch (err) {
        console.error("Fetch error:", err);
        result.innerText = `Failed to fetch items.\nError: ${err.message}`;
      }
    }
  </script>
</body>
</html>
